{% extends "base.html" %}
{% import "partials/nav.html" as nav %}

{% block title %}{{ title }} - {{ group.name }}{% endblock %}

{% block content %}
{{ nav.back('/groups/' ~ group.id, '團單') }}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h1 class="text-xl font-bold text-sela-800">{{ title }}</h1>
        
    </div>
    
    <div class="bg-white rounded-2xl shadow-sm p-4">
        <div class="flex justify-end mb-3">
            <button onclick="copyText()" 
                    class="text-sm bg-sela-600 hover:bg-sela-700 text-sela-800 px-4 py-2 rounded-lg">
                <i class="ti ti-clipboard-list"></i> 複製文字
            </button>
        </div>
        
        <pre id="export-text" class="whitespace-pre-wrap text-sm text-sela-800/80 bg-sela-50 p-4 rounded-lg overflow-x-auto">{{ text }}</pre>
    </div>
</div>

<script>
function copyText() {
    const text = document.getElementById('export-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
        alert('已複製到剪貼簿！');
    });
}
</script>
{% endblock %}
